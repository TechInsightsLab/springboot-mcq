<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional MCQ Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Header with Theme Toggle -->
        <div class="top-bar">
            <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>

        <!-- 1. Category Selection Screen -->
        <div id="category-screen">
            <h2>Select a Topic</h2>
            <div class="category-grid">
                <div class="cat-card" onclick="startQuiz('JavaScript')">
                    <div class="card-icon">📜</div>
                    <h3>JavaScript</h3>
                    <p>Logic & Syntax</p>
                </div>
                <div class="cat-card" onclick="startQuiz('HTML')">
                    <div class="card-icon">🌐</div>
                    <h3>HTML</h3>
                    <p>Structure & Tags</p>
                </div>
                <div class="cat-card" onclick="startQuiz('CSS')">
                    <div class="card-icon">🎨</div>
                    <h3>CSS</h3>
                    <p>Design & Layout</p>
                </div>
            </div>
        </div>

        <!-- 2. Quiz Screen -->
        <div id="quiz-box" class="hidden">
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="quiz-header">
                <button id="back-btn" onclick="goBack()">← Menu</button>
                <span>Q: <span id="current-pos">1</span>/<span id="total-questions">0</span></span>
                <span>Score: <span id="score">0</span></span>
            </div>
            <div id="quiz">
                <h2 id="question"></h2>
                <form id="options-form">
                    <label class="option-label"><input type="radio" name="answer" value="a"> <span id="text-a"></span></label>
                    <label class="option-label"><input type="radio" name="answer" value="b"> <span id="text-b"></span></label>
                    <label class="option-label"><input type="radio" name="answer" value="c"> <span id="text-c"></span></label>
                    <label class="option-label"><input type="radio" name="answer" value="d"> <span id="text-d"></span></label>
                </form>
            </div>
            <button id="next" class="hidden">Next Question</button>
        </div>

        <!-- 3. Result Screen -->
        <div id="result-screen" class="hidden">
            <h2>Quiz Results</h2>
            <div id="result-stats"></div>
            <div id="review-section"></div>
            <button class="main-btn" onclick="location.reload()">Restart Quiz</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
